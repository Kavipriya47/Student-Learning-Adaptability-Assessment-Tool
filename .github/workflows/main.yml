name: SLAA CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: backend
        run: |
          npm install
          npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: frontend
        run: |
          npm install
          CI=true npm test

  # Deployment steps can be added here once providers are confirmed
  # deploy-backend:
  #   needs: [test-backend, test-frontend]
  #   ...
